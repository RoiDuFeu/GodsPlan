version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: godsplan-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-godsplan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-godsplan_dev}
      POSTGRES_DB: ${POSTGRES_DB:-godsplan}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-godsplan}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin for database management (optional, comment out if not needed)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: godsplan-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@godsplan.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres

volumes:
  postgres_data:
  pgadmin_data:
